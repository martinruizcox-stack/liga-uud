<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liga Untap Upkeep Draw - Panel de Control</title>
    
    <link rel="icon" type="image/jpeg" href="./Untap Upkeep Draw logo.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen flex flex-col justify-between select-none">

    <div id="global-navbar"></div>

    <main class="container mx-auto p-6 flex-grow flex flex-col items-center justify-center">
        
        <div id="loader" class="text-center py-12">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-purple-500 mx-auto mb-4"></div>
            <p class="text-gray-400 text-sm">Cargando datos de jugador...</p>
        </div>

        <section id="zona-privada" class="w-full max-w-xl bg-gray-800 p-8 rounded-xl shadow-2xl border border-gray-700 hidden">
            <div class="border-b border-gray-700 pb-4 mb-6">
                <h2 class="text-2xl font-bold text-purple-400">Datos del Competidor</h2>
                <p class="text-xs text-gray-400">Identificadores para emparejamientos y reportes.</p>
            </div>
            
            <form onsubmit="actualizarPerfil(event)" class="space-y-5">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Nombre</label>
                        <input type="text" id="reg-nombre" required class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-sm text-gray-300 focus:outline-none focus:border-purple-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Apellido</label>
                        <input type="text" id="reg-apellido" required class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-sm text-gray-300 focus:outline-none focus:border-purple-500">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-purple-400 uppercase tracking-wider mb-1">Sobrenombre (ID en Mesa)</label>
                    <input type="text" id="reg-sobrenombre" required class="w-full bg-gray-900 border border-purple-500/50 rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none focus:border-purple-500">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Discord</label>
                        <button type="button" class="w-full bg-purple-600/30 border border-purple-500/40 text-purple-300 font-medium py-2.5 px-3 rounded-lg text-xs cursor-default">Conectado</button>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Usuario Topdeck.gg</label>
                        <input type="text" id="reg-topdeck" required placeholder="usuario" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2.5 text-sm text-gray-300 focus:outline-none focus:border-purple-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Teléfono</label>
                        <input type="tel" id="reg-telefono" required placeholder="+569..." class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-sm text-gray-300 focus:outline-none focus:border-purple-500">
                    </div>
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white font-bold py-3 px-4 rounded-lg shadow-lg transition-all mt-4">
                    Guardar Perfil
                </button>
            </form>
        </section>
    </main>

    <footer class="bg-gray-800 text-center p-4 text-xs text-gray-500 border-t border-gray-700">
        &copy; 2026 Untap Upkeep Draw cEDH League.
    </footer>

    <script src="./Java Script/navbar.js"></script>

    <script>
        // Función que sincroniza la carga del DOM con la inicialización del cliente (navbar.js)
        async function cargarDatosFormulario() {
            if (typeof mizuClient === 'undefined' || !usuarioActual) {
                setTimeout(cargarDatosFormulario, 100);
                return;
            }
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('zona-privada').classList.remove('hidden');
        }

        async function actualizarPerfil(event) {
            event.preventDefault();
            // Lógica de Supabase aquí
        }

        window.onload = cargarDatosFormulario;
    </script>
</body>
</html>
