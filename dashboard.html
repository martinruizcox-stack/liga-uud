<script>
    // 1. Esperamos a que la librería de Supabase esté disponible
    async function inicializarDashboard() {
        if (typeof supabase === 'undefined') {
            setTimeout(inicializarDashboard, 200);
            return;
        }

        // 2. Definimos el cliente localmente para este archivo
        const SUPABASE_URL = "https://kdwqdjfafywzttupgdvw.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_TmaZmfzJZU9WHpNMQgQ2wg_xZvPknuT";
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 3. Verificamos la sesión directamente
        const { data: { session } } = await client.auth.getSession();

        if (session) {
            // Usuario autenticado correctamente
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('zona-privada').classList.remove('hidden');
            console.log("Dashboard cargado para:", session.user.email);
        } else {
            // Si no hay sesión, redirigimos al login
            window.location.href = './index.html';
        }
    }

    // Ejecutar al cargar la página
    window.onload = inicializarDashboard;

    async function actualizarPerfil(event) {
        event.preventDefault();
        alert("Perfil actualizado correctamente");
    }
</script>
